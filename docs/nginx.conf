server {
    listen 4200;
    server_name _;
    port_in_redirect off;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — Docusaurus client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estaticos (Docusaurus gera hashes nos nomes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache de imagens e fontes
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Bloqueia acesso a dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }

    # Desabilita log de healthcheck
    location = /healthz {
        access_log off;
        return 200 "ok";
    }
}
