server {
    listen 4200;
    server_name _;
    server_tokens off;
    port_in_redirect off;

    # Defense-in-depth: headers also set by reverse proxy (Cloudflare/Traefik),
    # but duplicated here for direct-access and misconfiguration scenarios.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), accelerometer=(), gyroscope=(), magnetometer=(), autoplay=(), fullscreen=(self), payment=(), usb=(), bluetooth=(), serial=(), hid=(), display-capture=(), screen-wake-lock=(), idle-detection=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — Docusaurus client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos (Docusaurus gera hashes nos nomes)
    # Note: add_header in location blocks overrides server-level headers,
    # so security headers must be repeated here.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), accelerometer=(), gyroscope=(), magnetometer=(), autoplay=(), fullscreen=(self), payment=(), usb=(), bluetooth=(), serial=(), hid=(), display-capture=(), screen-wake-lock=(), idle-detection=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;" always;
    }

    # Cache de imagens e fontes
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), accelerometer=(), gyroscope=(), magnetometer=(), autoplay=(), fullscreen=(self), payment=(), usb=(), bluetooth=(), serial=(), hid=(), display-capture=(), screen-wake-lock=(), idle-detection=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;" always;
    }

    # Bloqueia acesso a dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }

    # Desabilita log de healthcheck
    location = /healthz {
        access_log off;
        return 200 "ok";
    }
}
