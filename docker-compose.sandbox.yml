services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    volumes:
      - .:/workspace
      - sandbox_deps:/workspace/node_modules
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
          pids: 256
        reservations:
          cpus: "1"
          memory: 512M
    tmpfs:
      - /tmp:size=512M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    network_mode: bridge

volumes:
  sandbox_deps:
